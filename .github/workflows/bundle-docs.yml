name: Bundle Documentation

on:
  push:
    branches: [main]
    paths:
      - 'en/**'
      - 'docs.json'

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate bundle
        run: bash scripts/bundle-docs.sh

      - name: Commit bundle to druma-docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add druma-docs-bundle.md
          git diff --cached --quiet || git commit -m "chore: auto-regenerate docs bundle" && git push

      - name: Copy bundle to druma repo
        env:
          GH_TOKEN: ${{ secrets.DRUMA_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/wesleyseynaeve-star/druma.git /tmp/druma
          cp druma-docs-bundle.md /tmp/druma/druma-docs-bundle.md
          cd /tmp/druma
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add druma-docs-bundle.md
          git diff --cached --quiet || git commit -m "chore: sync docs bundle from druma-docs" && git push
